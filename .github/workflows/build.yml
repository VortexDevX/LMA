name: Build & Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # Windows Build + Self-Signed Code Signing
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python scripts/generate_icon.py
        continue-on-error: true

      - name: Build executable
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Sign executable
        if: env.CODESIGN_PFX != ''
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        shell: powershell
        run: |
          # Decode PFX from base64 secret
          $pfxBytes = [Convert]::FromBase64String($env:CODESIGN_PFX)
          [IO.File]::WriteAllBytes("$PWD\lma_cert.pfx", $pfxBytes)

          # Find SignTool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Host "WARNING: SignTool not found, skipping signing"
            exit 0
          }

          Write-Host "Signing with: $($signtool.FullName)"

          & $signtool.FullName sign /f lma_cert.pfx /p $env:CODESIGN_PASSWORD `
            /t http://timestamp.digicert.com /fd SHA256 `
            /d "Local Monitor Agent" `
            "dist\LocalMonitorAgent.exe"

          # Cleanup
          Remove-Item "lma_cert.pfx" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-Windows
          path: dist/LocalMonitorAgent.exe

  # ============================================================
  # Linux Build + GPG Signing
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev gir1.2-gtk-3.0 libappindicator3-dev

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python scripts/generate_icon.py
        continue-on-error: true

      - name: Build executable
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Set permissions
        run: chmod +x dist/LocalMonitorAgent

      - name: GPG sign executable
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          # Sign the executable
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --armor --detach-sign dist/LocalMonitorAgent

          echo "Signed: dist/LocalMonitorAgent.asc"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-Linux
          path: |
            dist/LocalMonitorAgent
            dist/LocalMonitorAgent.asc

  # ============================================================
  # macOS Build + Ad-hoc Signing (free)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Generate macOS icon
        run: |
          # Convert iconset PNGs to .icns using macOS iconutil
          if [ -d "assets/icon/iconset" ]; then
            # iconutil requires the folder to be named *.iconset
            cp -r assets/icon/iconset assets/icon.iconset
            iconutil -c icns assets/icon.iconset -o assets/icon.icns
            rm -rf assets/icon.iconset
            echo "Generated assets/icon.icns"
          elif [ -f "assets/icon.png" ]; then
            # Fallback: use sips to create a basic icns from png
            mkdir -p assets/AppIcon.iconset
            sips -z 1024 1024 assets/icon.png --out assets/AppIcon.iconset/icon_512x512@2x.png
            sips -z 512 512 assets/icon.png --out assets/AppIcon.iconset/icon_512x512.png
            sips -z 256 256 assets/icon.png --out assets/AppIcon.iconset/icon_256x256.png
            sips -z 128 128 assets/icon.png --out assets/AppIcon.iconset/icon_128x128.png
            sips -z 32 32 assets/icon.png --out assets/AppIcon.iconset/icon_32x32.png
            sips -z 16 16 assets/icon.png --out assets/AppIcon.iconset/icon_16x16.png
            iconutil -c icns assets/AppIcon.iconset -o assets/icon.icns
            rm -rf assets/AppIcon.iconset
            echo "Generated assets/icon.icns from PNG"
          fi

      - name: Build app bundle
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Ad-hoc code sign (free)
        run: |
          # Ad-hoc sign - makes app runnable without Apple Developer account
          if [ -d "dist/LocalMonitorAgent.app" ]; then
            codesign --deep --force --sign - "dist/LocalMonitorAgent.app"
            echo "Ad-hoc signed: dist/LocalMonitorAgent.app"
            codesign --verify --verbose "dist/LocalMonitorAgent.app" || true
          elif [ -f "dist/LocalMonitorAgent" ]; then
            codesign --force --sign - "dist/LocalMonitorAgent"
            echo "Ad-hoc signed: dist/LocalMonitorAgent"
          fi

      - name: Create DMG
        run: |
          if [ -d "dist/LocalMonitorAgent.app" ]; then
            hdiutil create -volname "LocalMonitorAgent" -srcfolder dist/LocalMonitorAgent.app \
              -ov -format UDZO dist/LocalMonitorAgent.dmg
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-macOS
          path: |
            dist/LocalMonitorAgent.app
            dist/LocalMonitorAgent.dmg
            dist/LocalMonitorAgent

  # ============================================================
  # Create GitHub Release (on tag push)
  # ============================================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Try to delete existing release for this tag (ignore errors if not found)
          gh release delete "$TAG" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/LocalMonitorAgent-Windows/*
            artifacts/LocalMonitorAgent-Linux/*
            artifacts/LocalMonitorAgent-macOS/*
