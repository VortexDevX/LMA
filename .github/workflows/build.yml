name: Test, Build & Sign

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lma-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: Tests and lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check .

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match pyproject.toml version $version"
          }

  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Require a trusted Windows certificate for releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGN_PFX)) {
            throw "CODESIGN_PFX_BASE64 is required for tagged releases"
          }
          if ([string]::IsNullOrWhiteSpace($env:CODESIGN_PASSWORD)) {
            throw "CODESIGN_PASSWORD is required for tagged releases"
          }

      - name: Sign executable
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "lma-codesign.pfx"
          try {
            [IO.File]::WriteAllBytes(
              $pfxPath,
              [Convert]::FromBase64String($env:CODESIGN_PFX)
            )
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -match 'x64' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if (-not $signtool) { throw "SignTool was not found" }

            & $signtool.FullName sign /f $pfxPath /p $env:CODESIGN_PASSWORD `
              /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              /d "Local Monitor Agent" /du "https://github.com/VortexDevX/LMA" `
              "dist\LocalMonitorAgent.exe"
            if ($LASTEXITCODE -ne 0) { throw "SignTool signing failed" }

            $signature = Get-AuthenticodeSignature "dist\LocalMonitorAgent.exe"
            if (-not $signature.SignerCertificate) {
              throw "The Windows executable does not contain a signature"
            }
          }
          finally {
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Enforce public trust for Windows releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "dist\LocalMonitorAgent.exe"
          if ($signature.Status -ne "Valid") {
            throw "Windows signature is not publicly trusted: $($signature.Status)"
          }

      - name: Generate Windows checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist\LocalMonitorAgent.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  LocalMonitorAgent.exe" | Set-Content "dist\LocalMonitorAgent.exe.sha256" -Encoding ascii

      - name: Attest Windows executable
        uses: actions/attest@v4
        with:
          subject-path: dist/LocalMonitorAgent.exe

      - uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-Windows
          if-no-files-found: error
          path: |
            dist/LocalMonitorAgent.exe
            dist/LocalMonitorAgent.exe.sha256

  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev gir1.2-gtk-3.0 libappindicator3-dev python3-tk

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Rename executable
        run: |
          mv dist/LocalMonitorAgent dist/LocalMonitorAgent-linux
          chmod 0755 dist/LocalMonitorAgent-linux

      - name: Generate Linux checksum
        run: cd dist && sha256sum LocalMonitorAgent-linux > LocalMonitorAgent-linux.sha256

      - name: Attest Linux executable
        uses: actions/attest@v4
        with:
          subject-path: dist/LocalMonitorAgent-linux

      - uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-Linux
          if-no-files-found: error
          path: |
            dist/LocalMonitorAgent-linux
            dist/LocalMonitorAgent-linux.sha256

  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller \
            pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Build app bundle
        run: pyinstaller local-monitor-agent.spec --noconfirm

      - name: Ad-hoc self-sign app
        run: |
          codesign --deep --force --sign - dist/LocalMonitorAgent.app
          codesign --verify --deep --strict --verbose=2 dist/LocalMonitorAgent.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Local Monitor Agent" \
            -srcfolder dist/LocalMonitorAgent.app -ov -format UDZO \
            dist/LocalMonitorAgent-macos.dmg

      - name: Generate macOS checksum
        run: cd dist && shasum -a 256 LocalMonitorAgent-macos.dmg > LocalMonitorAgent-macos.dmg.sha256

      - name: Attest macOS DMG
        uses: actions/attest@v4
        with:
          subject-path: dist/LocalMonitorAgent-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: LocalMonitorAgent-macOS
          if-no-files-found: error
          path: |
            dist/LocalMonitorAgent.app
            dist/LocalMonitorAgent-macos.dmg
            dist/LocalMonitorAgent-macos.dmg.sha256

  release:
    name: Publish release
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish immutable versioned assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/LocalMonitorAgent-Windows/*
            artifacts/LocalMonitorAgent-Linux/*
            artifacts/LocalMonitorAgent-macOS/*
